<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlowStock — Sistema de Controle Dinâmico</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap');
  :root {
    --bg: #0f0f11;
    --bg2: #161618;
    --bg3: #1e1e21;
    --bg4: #252528;
    --border: #2e2e33;
    --border2: #3a3a40;
    --text: #e8e8ec;
    --text2: #9898a6;
    --text3: #5e5e6e;
    --accent: #6c63ff;
    --accent2: #8b84ff;
    --accent-bg: rgba(108,99,255,0.12);
    --accent-border: rgba(108,99,255,0.3);
    --green: #22c55e;
    --green-bg: rgba(34,197,94,0.1);
    --amber: #f59e0b;
    --amber-bg: rgba(245,158,11,0.1);
    --red: #ef4444;
    --red-bg: rgba(239,68,68,0.1);
    --blue: #3b82f6;
    --blue-bg: rgba(59,130,246,0.1);
    --radius: 8px;
    --radius-lg: 12px;
    --sidebar-w: 240px;
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; overflow-x: hidden; }
  
  /* AUTH */
  #auth-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg); }
  .auth-box { width: 380px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 40px; }
  .auth-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
  .auth-logo-icon { width: 36px; height: 36px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .auth-logo h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }
  .auth-logo span { color: var(--text2); font-size: 13px; display: block; font-weight: 300; }
  .auth-tabs { display: flex; gap: 0; margin-bottom: 24px; background: var(--bg3); border-radius: var(--radius); padding: 3px; }
  .auth-tab { flex: 1; padding: 7px; text-align: center; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text2); transition: all .15s; }
  .auth-tab.active { background: var(--bg4); color: var(--text); }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 6px; font-weight: 500; letter-spacing: 0.2px; }
  input[type=text], input[type=email], input[type=password], input[type=number], input[type=date], select, textarea {
    width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); padding: 9px 12px; color: var(--text); font-family: var(--font); font-size: 14px; outline: none; transition: border .15s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 80px; }
  select option { background: var(--bg3); }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; border-radius: var(--radius); border: none; cursor: pointer; font-family: var(--font); font-size: 13px; font-weight: 500; transition: all .15s; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent2); }
  .btn-secondary { background: var(--bg4); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--bg3); border-color: var(--border2); }
  .btn-danger { background: var(--red-bg); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }
  .btn-danger:hover { background: rgba(239,68,68,0.2); }
  .btn-ghost { background: transparent; color: var(--text2); }
  .btn-ghost:hover { background: var(--bg3); color: var(--text); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-full { width: 100%; justify-content: center; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .auth-error { color: var(--red); font-size: 12px; margin-top: 8px; display: none; }
  
  /* LAYOUT */
  #app { display: none; }
  .app-layout { display: flex; min-height: 100vh; }
  
  /* SIDEBAR */
  .sidebar { width: var(--sidebar-w); background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100; overflow-y: auto; }
  .sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
  .sidebar-logo { width: 28px; height: 28px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .sidebar-title { font-size: 14px; font-weight: 600; }
  .sidebar-nav { flex: 1; padding: 8px; }
  .nav-section { margin-bottom: 4px; }
  .nav-section-label { font-size: 10px; color: var(--text3); font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; padding: 8px 8px 4px; }
  .nav-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: var(--radius); cursor: pointer; color: var(--text2); font-size: 13px; transition: all .15s; position: relative; }
  .nav-item:hover { background: var(--bg3); color: var(--text); }
  .nav-item.active { background: var(--accent-bg); color: var(--accent2); }
  .nav-item .badge { margin-left: auto; background: var(--accent-bg); color: var(--accent2); font-size: 10px; padding: 1px 6px; border-radius: 10px; }
  .nav-icon { font-size: 14px; width: 18px; text-align: center; flex-shrink: 0; }
  .sidebar-footer { padding: 12px; border-top: 1px solid var(--border); }
  .user-card { display: flex; align-items: center; gap: 8px; padding: 8px; border-radius: var(--radius); background: var(--bg3); }
  .user-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--accent-bg); border: 1px solid var(--accent-border); display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--accent2); font-weight: 600; flex-shrink: 0; }
  .user-info { flex: 1; min-width: 0; }
  .user-name { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .user-role { font-size: 10px; color: var(--text3); }
  
  /* MAIN */
  .main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
  .topbar { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 0 24px; height: 56px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 50; }
  .topbar-title { font-size: 16px; font-weight: 600; flex: 1; }
  .topbar-actions { display: flex; align-items: center; gap: 8px; }
  .content { padding: 24px; flex: 1; }
  
  /* CARDS */
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); }
  .card-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .card-title { font-size: 14px; font-weight: 600; }
  .card-body { padding: 20px; }
  
  /* TABLE */
  .table-wrap { overflow-x: auto; border-radius: var(--radius-lg); border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { background: var(--bg3); padding: 10px 14px; text-align: left; font-size: 11px; color: var(--text2); font-weight: 600; letter-spacing: 0.4px; text-transform: uppercase; border-bottom: 1px solid var(--border); white-space: nowrap; cursor: pointer; user-select: none; }
  thead th:hover { color: var(--text); }
  tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--bg3); }
  tbody td { padding: 10px 14px; color: var(--text2); vertical-align: middle; }
  tbody td:first-child { color: var(--text); }
  .empty-state { text-align: center; padding: 48px 20px; color: var(--text3); }
  .empty-state .icon { font-size: 32px; margin-bottom: 12px; }
  .empty-state p { font-size: 13px; }
  
  /* BADGES */
  .badge-status { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .badge-green { background: var(--green-bg); color: var(--green); }
  .badge-amber { background: var(--amber-bg); color: var(--amber); }
  .badge-red { background: var(--red-bg); color: var(--red); }
  .badge-blue { background: var(--blue-bg); color: var(--blue); }
  .badge-accent { background: var(--accent-bg); color: var(--accent2); }
  
  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .modal { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); width: 100%; max-width: 560px; max-height: 90vh; display: flex; flex-direction: column; }
  .modal-lg { max-width: 780px; }
  .modal-xl { max-width: 1000px; }
  .modal-header { padding: 18px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .modal-title { font-size: 15px; font-weight: 600; }
  .modal-body { padding: 20px; overflow-y: auto; flex: 1; }
  .modal-footer { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: flex-end; gap: 8px; flex-shrink: 0; }
  .modal-close { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 18px; padding: 4px; border-radius: 4px; }
  .modal-close:hover { color: var(--text); background: var(--bg3); }
  
  /* FORM */
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .form-check { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: var(--radius); border: 1px solid var(--border); cursor: pointer; transition: border .15s; }
  .form-check:hover { border-color: var(--border2); }
  .form-check input[type=checkbox] { accent-color: var(--accent); width: 14px; height: 14px; cursor: pointer; }
  .form-check label { cursor: pointer; font-size: 13px; }
  .form-hint { font-size: 11px; color: var(--text3); margin-top: 4px; }
  .divider { height: 1px; background: var(--border); margin: 20px 0; }
  
  /* STATS */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px 18px; }
  .stat-label { font-size: 11px; color: var(--text3); font-weight: 500; letter-spacing: 0.4px; text-transform: uppercase; margin-bottom: 8px; }
  .stat-value { font-size: 26px; font-weight: 600; font-family: var(--mono); }
  .stat-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }
  
  /* TOOLBAR */
  .table-toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
  .search-box { position: relative; flex: 1; min-width: 200px; }
  .search-box input { padding-left: 32px; }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 13px; pointer-events: none; }
  
  /* FIELD BUILDER */
  .field-item { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
  .field-handle { cursor: grab; color: var(--text3); font-size: 16px; }
  .field-info { flex: 1; }
  .field-name { font-size: 13px; font-weight: 500; }
  .field-meta { font-size: 11px; color: var(--text3); margin-top: 2px; display: flex; gap: 8px; }
  .field-tag { background: var(--bg4); padding: 1px 6px; border-radius: 4px; }
  .field-actions { display: flex; gap: 4px; }
  
  /* SCREENS */
  .screen-page { display: none; }
  .screen-page.active { display: block; }
  
  /* COMMAND BUTTONS */
  .cmd-btn { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: var(--radius); background: var(--accent-bg); color: var(--accent2); border: 1px solid var(--accent-border); cursor: pointer; font-size: 11px; font-weight: 500; transition: all .15s; white-space: nowrap; }
  .cmd-btn:hover { background: rgba(108,99,255,0.2); }
  
  /* TABS */
  .tab-bar { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
  .tab-btn { padding: 10px 16px; font-size: 13px; font-weight: 500; color: var(--text2); cursor: pointer; border-bottom: 2px solid transparent; transition: all .15s; background: none; border-top: none; border-left: none; border-right: none; }
  .tab-btn.active { color: var(--accent2); border-bottom-color: var(--accent); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  
  /* CHART */
  .chart-container { position: relative; height: 260px; }
  
  /* ALERTS */
  .alert { padding: 10px 14px; border-radius: var(--radius); font-size: 13px; margin-bottom: 14px; display: none; }
  .alert-error { background: var(--red-bg); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }
  .alert-success { background: var(--green-bg); color: var(--green); border: 1px solid rgba(34,197,94,0.2); }
  
  /* ADMIN PANEL */
  .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .admin-card { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; cursor: pointer; transition: all .15s; }
  .admin-card:hover { border-color: var(--accent-border); background: var(--bg2); }
  .admin-card-icon { font-size: 24px; margin-bottom: 12px; }
  .admin-card h3 { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .admin-card p { font-size: 12px; color: var(--text3); }
  
  /* LOADING */
  .loading { display: flex; align-items: center; justify-content: center; padding: 40px; color: var(--text3); gap: 10px; }
  .spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  
  /* AUDIT */
  .audit-row { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); align-items: flex-start; }
  .audit-row:last-child { border-bottom: none; }
  .audit-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); margin-top: 5px; flex-shrink: 0; }
  .audit-info { flex: 1; }
  .audit-action { font-size: 13px; font-weight: 500; }
  .audit-meta { font-size: 11px; color: var(--text3); margin-top: 2px; }
  
  /* TOOLTIP */
  [data-tip] { position: relative; }
  [data-tip]:hover::after { content: attr(data-tip); position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%); background: var(--bg4); border: 1px solid var(--border); border-radius: 6px; padding: 5px 10px; font-size: 11px; white-space: nowrap; z-index: 999; pointer-events: none; color: var(--text); }
  
  /* COLORS */
  .text-accent { color: var(--accent2); }
  .text-muted { color: var(--text2); }
  .text-faint { color: var(--text3); }
  .text-green { color: var(--green); }
  .text-red { color: var(--red); }
  .text-amber { color: var(--amber); }
  
  /* DRAG HIGHLIGHT */
  .drag-over { outline: 2px dashed var(--accent); outline-offset: -2px; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  
  /* RESPONSIVE */
  @media (max-width: 768px) {
    .sidebar { transform: translateX(-100%); }
    .main { margin-left: 0; }
    .form-row { grid-template-columns: 1fr; }
    .admin-grid { grid-template-columns: 1fr; }
  }
  
  .col-actions { white-space: nowrap; }
  .flex { display: flex; }
  .items-center { align-items: center; }
  .gap-8 { gap: 8px; }
  .gap-12 { gap: 12px; }
  .gap-16 { gap: 16px; }
  .mb-4 { margin-bottom: 4px; }
  .mb-8 { margin-bottom: 8px; }
  .mb-12 { margin-bottom: 12px; }
  .mb-16 { margin-bottom: 16px; }
  .mb-20 { margin-bottom: 20px; }
  .mb-24 { margin-bottom: 24px; }
  .mt-8 { margin-top: 8px; }
  .ml-auto { margin-left: auto; }
  .font-mono { font-family: var(--mono); }
  .text-sm { font-size: 12px; }
  .text-xs { font-size: 11px; }
  .fw-500 { font-weight: 500; }
  .fw-600 { font-weight: 600; }
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="auth-logo-icon">⚡</div>
      <div>
        <h1>FlowStock</h1>
        <span>Sistema de Controle Dinâmico</span>
      </div>
    </div>
    <div class="auth-tabs">
      <div class="auth-tab active" onclick="switchAuthTab('login')">Entrar</div>
      <div class="auth-tab" onclick="switchAuthTab('register')">Cadastrar</div>
    </div>
    <div id="login-form">
      <div class="form-group"><label>E-mail</label><input type="email" id="login-email" placeholder="seu@email.com"></div>
      <div class="form-group"><label>Senha</label><input type="password" id="login-pass" placeholder="••••••••"></div>
      <div class="alert alert-error" id="login-error"></div>
      <button class="btn btn-primary btn-full" style="margin-top:8px" onclick="doLogin()">Entrar</button>
    </div>
    <div id="register-form" style="display:none">
      <div class="form-group"><label>Nome</label><input type="text" id="reg-name" placeholder="Seu nome"></div>
      <div class="form-group"><label>E-mail</label><input type="email" id="reg-email" placeholder="seu@email.com"></div>
      <div class="form-group"><label>Senha</label><input type="password" id="reg-pass" placeholder="mínimo 6 caracteres"></div>
      <div class="form-group"><label>Senha Mestre (opcional — para acesso admin)</label><input type="password" id="reg-master" placeholder="Deixe em branco se não for admin"></div>
      <div class="alert alert-error" id="reg-error"></div>
      <div class="alert alert-success" id="reg-success"></div>
      <button class="btn btn-primary btn-full" style="margin-top:8px" onclick="doRegister()">Criar conta</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">⚡</div>
        <div class="sidebar-title">FlowStock</div>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav">
        <div class="nav-section">
          <div class="nav-section-label">Principal</div>
          <div class="nav-item" onclick="goHome()">
            <span class="nav-icon">🏠</span> Início
          </div>
        </div>
        <div class="nav-section" id="screens-nav"></div>
        <div class="nav-section" id="admin-nav" style="display:none">
          <div class="nav-section-label">Administração</div>
          <div class="nav-item" onclick="showAdmin('screens')"><span class="nav-icon">📐</span> Telas</div>
          <div class="nav-item" onclick="showAdmin('users')"><span class="nav-icon">👥</span> Usuários</div>
          <div class="nav-item" onclick="showAdmin('audit')"><span class="nav-icon">📋</span> Auditoria</div>
        </div>
      </nav>
      <div class="sidebar-footer">
        <div class="user-card">
          <div class="user-avatar" id="user-avatar">?</div>
          <div class="user-info">
            <div class="user-name" id="user-name-display">Carregando…</div>
            <div class="user-role" id="user-role-display">usuário</div>
          </div>
          <button class="btn btn-ghost btn-sm" onclick="doLogout()" data-tip="Sair" style="padding:4px 6px">⏻</button>
        </div>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="topbar-title" id="topbar-title">Início</div>
        <div class="topbar-actions" id="topbar-actions"></div>
      </div>
      <div class="content" id="main-content">
        <div class="loading"><div class="spinner"></div> Carregando…</div>
      </div>
    </main>
  </div>
</div>

<!-- MODALS (shared) -->
<div id="modal-container"></div>

<script>
// ─── FIREBASE INIT ────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyADZphyLztYYeMV130uyq_3CYthr6QzBo0",
  authDomain: "coringa-c0bce.firebaseapp.com",
  projectId: "coringa-c0bce",
  storageBucket: "coringa-c0bce.firebasestorage.app",
  messagingSenderId: "346363639454",
  appId: "1:346363639454:web:38b288fe0d7abf66daad8f"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

const MASTER_PASSWORD = "flowstock@master2024";

// ─── GLOBALS ──────────────────────────────────────────────────────
let currentUser = null;
let userProfile = null;
let isAdmin = false;
let isMasterAdmin = false;
let allScreens = [];
let currentScreen = null;
let chartInstances = {};

// ─── AUTH ─────────────────────────────────────────────────────────
function switchAuthTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')));
  document.getElementById('login-form').style.display = tab==='login'?'block':'none';
  document.getElementById('register-form').style.display = tab==='register'?'block':'none';
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  const err = document.getElementById('login-error');
  err.style.display='none';
  if(!email||!pass){ err.textContent='Preencha todos os campos'; err.style.display='block'; return; }
  try {
    await auth.signInWithEmailAndPassword(email, pass);
  } catch(e) {
    err.textContent = e.code==='auth/invalid-credential'?'E-mail ou senha incorretos':e.message;
    err.style.display='block';
  }
}

async function doRegister() {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pass = document.getElementById('reg-pass').value;
  const master = document.getElementById('reg-master').value;
  const err = document.getElementById('reg-error');
  const suc = document.getElementById('reg-success');
  err.style.display='none'; suc.style.display='none';
  if(!name||!email||!pass){ err.textContent='Preencha todos os campos'; err.style.display='block'; return; }
  let role = 'user';
  if(master) {
    if(master!==MASTER_PASSWORD){ err.textContent='Senha mestre incorreta'; err.style.display='block'; return; }
    role = 'admin';
  }
  try {
    const cred = await auth.createUserWithEmailAndPassword(email, pass);
    await db.collection('users').doc(cred.user.uid).set({ name, email, role, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
    suc.textContent='Conta criada! Fazendo login…'; suc.style.display='block';
  } catch(e) {
    err.textContent = e.message; err.style.display='block';
  }
}

function doLogout() { auth.signOut(); }

auth.onAuthStateChanged(async user => {
  if(user) {
    currentUser = user;
    const snap = await db.collection('users').doc(user.uid).get();
    userProfile = snap.exists ? snap.data() : { name: user.email, role:'user' };
    isAdmin = userProfile.role==='admin';
    isMasterAdmin = isAdmin;
    document.getElementById('auth-screen').style.display='none';
    document.getElementById('app').style.display='block';
    initApp();
  } else {
    currentUser = null; userProfile = null; isAdmin = false;
    document.getElementById('auth-screen').style.display='flex';
    document.getElementById('app').style.display='none';
  }
});

// ─── APP INIT ─────────────────────────────────────────────────────
async function initApp() {
  const name = userProfile.name||currentUser.email;
  const initials = name.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
  document.getElementById('user-avatar').textContent = initials;
  document.getElementById('user-name-display').textContent = name;
  document.getElementById('user-role-display').textContent = isAdmin?'Administrador':'Usuário';
  if(isAdmin) document.getElementById('admin-nav').style.display='block';
  
  // Load screens
  await loadScreens();
  goHome();
  
  // Ensure default "Entradas" screen exists
  if(allScreens.length===0 && isAdmin) {
    await createDefaultScreen();
  }
}

async function loadScreens() {
  const snap = await db.collection('screens').orderBy('order').get();
  allScreens = snap.docs.map(d=>({id:d.id,...d.data()}));
  renderScreensNav();
}

function renderScreensNav() {
  const nav = document.getElementById('screens-nav');
  if(allScreens.length===0){ nav.innerHTML=''; return; }
  nav.innerHTML = `<div class="nav-section-label">Telas</div>` +
    allScreens.map(s=>`<div class="nav-item" id="nav-screen-${s.id}" onclick="showScreen('${s.id}')">
      <span class="nav-icon">${s.icon||'📋'}</span> ${s.name}
    </div>`).join('');
}

async function createDefaultScreen() {
  const ref = db.collection('screens').doc();
  const screen = {
    name: 'Entradas',
    icon: '📥',
    order: 0,
    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    fields: [
      { id:'f1', name:'Código', type:'text', required:true, unique:true, editable:false, showInTable:true, order:0 },
      { id:'f2', name:'Produto', type:'text', required:true, unique:false, editable:true, showInTable:true, order:1 },
      { id:'f3', name:'Quantidade', type:'number', required:true, unique:false, editable:true, showInTable:true, order:2 },
      { id:'f4', name:'Data', type:'date', required:true, unique:false, editable:true, showInTable:true, order:3 },
      { id:'f5', name:'Observações', type:'textarea', required:false, unique:false, editable:true, showInTable:false, order:4 },
    ],
    commands: [],
    charts: []
  };
  await ref.set(screen);
  allScreens = [{id:ref.id, ...screen}];
  renderScreensNav();
}

// ─── HOME ─────────────────────────────────────────────────────────
async function goHome() {
  setActivePage('home');
  setTopbar('Início','');
  const content = document.getElementById('main-content');
  
  // Count records per screen
  const counts = await Promise.all(allScreens.map(async s => {
    const snap = await db.collection('records').where('screenId','==',s.id).get();
    return { name:s.name, count:snap.size, icon:s.icon||'📋' };
  }));
  
  content.innerHTML = `
    <div class="mb-24">
      <div class="stats-grid">
        ${counts.map(c=>`<div class="stat-card">
          <div class="stat-label">${c.icon} ${c.name}</div>
          <div class="stat-value">${c.count}</div>
          <div class="stat-sub">registros</div>
        </div>`).join('')}
        <div class="stat-card">
          <div class="stat-label">📺 Total de telas</div>
          <div class="stat-value">${allScreens.length}</div>
          <div class="stat-sub">configuradas</div>
        </div>
      </div>
    </div>
    ${allScreens.length===0 ? `<div class="empty-state"><div class="icon">📐</div><p>Nenhuma tela configurada ainda.<br>${isAdmin?'Vá em Administração → Telas para criar.':''}</p></div>` : ''}
    ${allScreens.length>0 ? `<div class="mb-12"><h2 style="font-size:15px;font-weight:600;margin-bottom:12px">Acessar telas</h2>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px">
    ${allScreens.map(s=>`<div class="card" style="cursor:pointer;padding:16px;transition:all .15s" onclick="showScreen('${s.id}')" onmouseover="this.style.borderColor='var(--accent-border)'" onmouseout="this.style.borderColor='var(--border)'">
      <div style="font-size:24px;margin-bottom:8px">${s.icon||'📋'}</div>
      <div style="font-weight:600;margin-bottom:4px">${s.name}</div>
      <div style="font-size:12px;color:var(--text3)">${counts.find(c=>c.name===s.name)?.count||0} registros</div>
    </div>`).join('')}
    </div></div>` : ''}`;
}

// ─── SCREENS ──────────────────────────────────────────────────────
async function showScreen(screenId) {
  const screen = allScreens.find(s=>s.id===screenId);
  if(!screen) return;
  currentScreen = screen;
  setActivePage('screen-'+screenId);
  setTopbar(screen.name, isAdmin ? `<button class="btn btn-secondary btn-sm" onclick="openScreenConfig('${screenId}')">⚙ Configurar tela</button>` : '');
  
  const content = document.getElementById('main-content');
  content.innerHTML = `<div class="loading"><div class="spinner"></div> Carregando registros…</div>`;
  
  const snap = await db.collection('records').where('screenId','==',screenId).orderBy('createdAt','desc').get();
  const records = snap.docs.map(d=>({id:d.id,...d.data()}));
  
  const fields = (screen.fields||[]).slice().sort((a,b)=>a.order-b.order);
  const visibleFields = fields.filter(f=>f.showInTable!==false);
  const commands = screen.commands||[];
  const charts = screen.charts||[];
  
  const hasTabs = charts.length>0;
  
  content.innerHTML = `
    ${hasTabs ? `<div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab(this,'tab-records')">📋 Registros</button>
      <button class="tab-btn" onclick="switchTab(this,'tab-charts')">📊 Gráficos</button>
    </div>` : ''}
    
    <div id="tab-records" class="${hasTabs?'tab-content active':''}">
      <div class="table-toolbar">
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" id="global-search" placeholder="Buscar em todos os campos…" oninput="filterTable()">
        </div>
        <button class="btn btn-primary btn-sm" onclick="openRegisterModal('${screenId}')">+ Novo registro</button>
        ${isAdmin?`<button class="btn btn-secondary btn-sm" onclick="exportCSV()">↓ CSV</button>
        <button class="btn btn-secondary btn-sm" onclick="exportXLSX()">↓ XLSX</button>`:''}
      </div>
      <div class="table-wrap">
        <table id="records-table">
          <thead>
            <tr>
              ${visibleFields.map(f=>`<th onclick="sortTable('${f.id}')">${f.name} <span style="color:var(--text3);font-size:9px">▼</span></th>`).join('')}
              <th>Criado por</th><th>Data/Hora</th>
              ${(commands.length>0||isAdmin)?'<th>Ações</th>':''}
            </tr>
          </thead>
          <tbody id="records-body">
            ${records.length===0 ? `<tr><td colspan="99"><div class="empty-state"><div class="icon">📭</div><p>Nenhum registro encontrado</p></div></td></tr>` :
              records.map(r=>renderRecordRow(r, visibleFields, commands, screenId)).join('')}
          </tbody>
        </table>
      </div>
      <div style="margin-top:10px;font-size:12px;color:var(--text3)" id="row-count">${records.length} registro(s)</div>
    </div>
    
    ${hasTabs ? `<div id="tab-charts" class="tab-content">
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:16px">
        ${charts.map((c,i)=>`<div class="card"><div class="card-header"><div class="card-title">${c.title}</div>${isAdmin?`<button class="btn btn-ghost btn-sm" onclick="editChart('${screenId}',${i})">✏</button>`:''}
        </div><div class="card-body"><div class="chart-container"><canvas id="chart-${i}"></canvas></div></div></div>`).join('')}
        ${isAdmin?`<div class="card" style="cursor:pointer;border-style:dashed" onclick="addChart('${screenId}')"><div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:160px;color:var(--text3)"><div style="font-size:28px;margin-bottom:8px">+</div><div style="font-size:13px">Adicionar gráfico</div></div></div>`:''}
      </div>
    </div>` : ''}`;
  
  // Store records for table ops
  window._currentRecords = records;
  window._currentFields = fields;
  window._currentVisibleFields = visibleFields;
  window._currentCommands = commands;
  window._currentScreenId = screenId;
  
  // Render charts
  if(hasTabs) setTimeout(()=>renderCharts(charts, records, fields), 100);
}

function renderRecordRow(r, visibleFields, commands, screenId) {
  const cells = visibleFields.map(f=>{
    let val = r.data?.[f.id] ?? '';
    if(f.type==='date' && val) val = new Date(val+'T00:00:00').toLocaleDateString('pt-BR');
    return `<td>${val||'<span class="text-faint">—</span>'}</td>`;
  }).join('');
  
  const createdBy = r.createdBy?.name||'—';
  const createdAt = r.createdAt?.toDate ? r.createdAt.toDate().toLocaleString('pt-BR') : '—';
  
  const cmdBtns = commands.map(c=>`<button class="cmd-btn" onclick="executeCommand('${c.id}','${r.id}','${screenId}')">${c.icon||'▶'} ${c.name}</button>`).join(' ');
  const adminBtns = isAdmin ? `<button class="btn btn-ghost btn-sm" onclick="editRecord('${r.id}','${screenId}')" data-tip="Editar">✏</button>
    <button class="btn btn-danger btn-sm" onclick="deleteRecord('${r.id}','${screenId}')" data-tip="Excluir">🗑</button>` : '';
  
  const hasActions = commands.length>0||isAdmin;
  
  return `<tr id="row-${r.id}">
    ${cells}
    <td class="text-muted">${createdBy}</td>
    <td class="text-muted font-mono" style="font-size:11px">${createdAt}</td>
    ${hasActions?`<td class="col-actions">${cmdBtns} ${adminBtns}</td>`:''}
  </tr>`;
}

// ─── TABLE OPS ────────────────────────────────────────────────────
let sortCol = null, sortDir = 1;

function filterTable() {
  const q = document.getElementById('global-search')?.value.toLowerCase()||'';
  const rows = document.querySelectorAll('#records-body tr');
  let visible = 0;
  rows.forEach(row=>{
    const text = row.textContent.toLowerCase();
    const show = !q || text.includes(q);
    row.style.display = show?'':'none';
    if(show) visible++;
  });
  const el = document.getElementById('row-count');
  if(el) el.textContent = visible+' registro(s)';
}

function sortTable(fieldId) {
  if(sortCol===fieldId) sortDir*=-1; else { sortCol=fieldId; sortDir=1; }
  const records = [...(window._currentRecords||[])];
  records.sort((a,b)=>{
    const va = a.data?.[fieldId]||''; const vb = b.data?.[fieldId]||'';
    return String(va).localeCompare(String(vb), undefined, {numeric:true})*sortDir;
  });
  const tbody = document.getElementById('records-body');
  if(tbody) tbody.innerHTML = records.map(r=>renderRecordRow(r, window._currentVisibleFields||[], window._currentCommands||[], window._currentScreenId)).join('');
}

function exportCSV() {
  const records = window._currentRecords||[];
  const fields = window._currentVisibleFields||[];
  const header = [...fields.map(f=>f.name),'Criado por','Data/Hora'].join(',');
  const rows = records.map(r=>[
    ...fields.map(f=>JSON.stringify(r.data?.[f.id]||'')),
    JSON.stringify(r.createdBy?.name||''),
    JSON.stringify(r.createdAt?.toDate?r.createdAt.toDate().toLocaleString('pt-BR'):'')
  ].join(','));
  const blob = new Blob([[header,...rows].join('\n')],{type:'text/csv'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = (currentScreen?.name||'export')+'.csv'; a.click();
}

function exportXLSX() {
  const records = window._currentRecords||[];
  const fields = window._currentVisibleFields||[];
  const data = [fields.map(f=>f.name).concat(['Criado por','Data/Hora'])];
  records.forEach(r=>{
    data.push([
      ...fields.map(f=>r.data?.[f.id]||''),
      r.createdBy?.name||'',
      r.createdAt?.toDate?r.createdAt.toDate().toLocaleString('pt-BR'):''
    ]);
  });
  const ws = XLSX.utils.aoa_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, currentScreen?.name||'Sheet1');
  XLSX.writeFile(wb, (currentScreen?.name||'export')+'.xlsx');
}

// ─── REGISTER MODAL ───────────────────────────────────────────────
function openRegisterModal(screenId, existingRecord=null) {
  const screen = allScreens.find(s=>s.id===screenId);
  if(!screen) return;
  const fields = (screen.fields||[]).slice().sort((a,b)=>a.order-b.order);
  const isEdit = !!existingRecord;
  
  const fieldsHtml = fields.map(f=>{
    if(!isEdit && !f.required && f.type==='hidden') return '';
    const val = existingRecord?.data?.[f.id]||'';
    const disabled = isEdit && !f.editable ? 'disabled style="opacity:.6"':'';
    let input = '';
    if(f.type==='textarea') input=`<textarea id="field-${f.id}" ${disabled} ${f.required?'required':''}>${val}</textarea>`;
    else if(f.type==='select') {
      const opts = (f.options||[]).map(o=>`<option value="${o}" ${val===o?'selected':''}>${o}</option>`).join('');
      input=`<select id="field-${f.id}" ${disabled} ${f.required?'required':''}><option value="">Selecionar…</option>${opts}</select>`;
    }
    else if(f.type==='linked') {
      input=`<select id="field-${f.id}" ${disabled} ${f.required?'required':''}><option value="">Carregando…</option></select>`;
    }
    else input=`<input type="${f.type==='number'?'number':'text'}" id="field-${f.id}" value="${val}" ${disabled} ${f.required?'required':''} placeholder="${f.name}…">`;
    
    return `<div class="form-group"><label>${f.name}${f.required?' <span style="color:var(--red)">*</span>':''}</label>${input}${!f.editable&&isEdit?`<div class="form-hint">Campo não editável após registro</div>`:''}</div>`;
  }).join('');
  
  showModal(`<div class="modal">
    <div class="modal-header">
      <div class="modal-title">${isEdit?'Editar':'Novo'} registro — ${screen.name}</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">${fieldsHtml}</div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveRecord('${screenId}','${existingRecord?.id||''}')">
        ${isEdit?'Salvar alterações':'Registrar'}
      </button>
    </div>
  </div>`);
  
  // Load linked fields
  fields.filter(f=>f.type==='linked'&&f.linkedScreen).forEach(f=>{
    loadLinkedOptions(f);
  });
}

async function loadLinkedOptions(field) {
  const sel = document.getElementById('field-'+field.id);
  if(!sel) return;
  const snap = await db.collection('records').where('screenId','==',field.linkedScreen).get();
  sel.innerHTML = '<option value="">Selecionar…</option>';
  snap.docs.forEach(d=>{
    const data = d.data().data||{};
    const label = Object.values(data)[0]||d.id;
    sel.innerHTML += `<option value="${label}">${label}</option>`;
  });
}

async function saveRecord(screenId, recordId='') {
  const screen = allScreens.find(s=>s.id===screenId);
  if(!screen) return;
  const fields = screen.fields||[];
  const data = {};
  let valid = true;
  
  for(const f of fields) {
    const el = document.getElementById('field-'+f.id);
    if(!el) continue;
    const val = el.value;
    if(f.required && !val) { el.style.borderColor='var(--red)'; valid=false; continue; }
    el.style.borderColor='';
    data[f.id] = f.type==='number' ? (parseFloat(val)||0) : val;
  }
  if(!valid) return;
  
  // Unique check
  for(const f of fields.filter(f=>f.unique)) {
    const snap = await db.collection('records')
      .where('screenId','==',screenId)
      .where(`data.${f.id}`,'==',data[f.id]).get();
    if(!snap.empty && (snap.docs[0].id!==recordId)) {
      alert(`O campo "${f.name}" deve ser único. Valor "${data[f.id]}" já existe.`); return;
    }
  }
  
  const now = firebase.firestore.FieldValue.serverTimestamp();
  const userInfo = { uid:currentUser.uid, name:userProfile.name||currentUser.email };
  
  if(recordId) {
    await db.collection('records').doc(recordId).update({ data, updatedAt:now, updatedBy:userInfo });
    await logAudit('edit', screenId, recordId, `Registro editado em ${screen.name}`);
  } else {
    const ref = await db.collection('records').add({ screenId, data, createdAt:now, createdBy:userInfo });
    await logAudit('create', screenId, ref.id, `Registro criado em ${screen.name}`);
  }
  
  closeModal();
  showScreen(screenId);
}

async function editRecord(recordId, screenId) {
  const snap = await db.collection('records').doc(recordId).get();
  if(snap.exists) openRegisterModal(screenId, {id:recordId, ...snap.data()});
}

async function deleteRecord(recordId, screenId) {
  if(!confirm('Excluir este registro? Esta ação não pode ser desfeita.')) return;
  await db.collection('records').doc(recordId).delete();
  await logAudit('delete', screenId, recordId, 'Registro excluído');
  showScreen(screenId);
}

// ─── COMMANDS ─────────────────────────────────────────────────────
async function executeCommand(cmdId, recordId, screenId) {
  const screen = allScreens.find(s=>s.id===screenId);
  const cmd = (screen?.commands||[]).find(c=>c.id===cmdId);
  if(!cmd) return;
  
  const snap = await db.collection('records').doc(recordId).get();
  const record = {id:recordId, ...snap.data()};
  
  const addFields = cmd.fields||[];
  const fieldsHtml = addFields.map(f=>{
    return `<div class="form-group"><label>${f.name}${f.required?' <span style="color:var(--red)">*</span>':''}</label>
      <input type="text" id="cmd-field-${f.id}" placeholder="${f.name}…" ${f.required?'required':''}>
    </div>`;
  }).join('');
  
  showModal(`<div class="modal">
    <div class="modal-header">
      <div class="modal-title">${cmd.icon||'▶'} ${cmd.name}</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      ${cmd.description?`<p style="font-size:13px;color:var(--text2);margin-bottom:16px">${cmd.description}</p>`:''}
      ${fieldsHtml||'<p style="color:var(--text2);font-size:13px">Confirmar execução desta ação?</p>'}
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="confirmCommand('${cmdId}','${recordId}','${screenId}')">Confirmar</button>
    </div>
  </div>`);
}

async function confirmCommand(cmdId, recordId, screenId) {
  const screen = allScreens.find(s=>s.id===screenId);
  const cmd = (screen?.commands||[]).find(c=>c.id===cmdId);
  if(!cmd) return;
  
  const addData = {};
  (cmd.fields||[]).forEach(f=>{
    const el = document.getElementById('cmd-field-'+f.id);
    if(el) addData[f.id] = el.value;
  });
  
  const snap = await db.collection('records').doc(recordId).get();
  const old = snap.data();
  
  const now = firebase.firestore.FieldValue.serverTimestamp();
  const userInfo = { uid:currentUser.uid, name:userProfile.name||currentUser.email };
  
  if(cmd.targetScreen) {
    // Move to target screen
    const newData = { ...(old.data||{}), ...addData };
    await db.collection('records').add({
      screenId: cmd.targetScreen,
      data: newData,
      createdAt: now,
      createdBy: userInfo,
      movedFrom: { screenId, screenName: screen.name, command: cmd.name, at: now, by: userInfo }
    });
    await db.collection('records').doc(recordId).delete();
    await logAudit('move', screenId, recordId, `Movido para "${allScreens.find(s=>s.id===cmd.targetScreen)?.name||cmd.targetScreen}" via "${cmd.name}"`);
  } else {
    // Just update
    await db.collection('records').doc(recordId).update({ [`data`]: {...(old.data||{}), ...addData}, updatedAt:now, updatedBy:userInfo });
    await logAudit('command', screenId, recordId, `Comando "${cmd.name}" executado`);
  }
  
  closeModal();
  showScreen(screenId);
}

// ─── CHARTS ───────────────────────────────────────────────────────
function renderCharts(charts, records, fields) {
  charts.forEach((c,i)=>{
    const canvas = document.getElementById('chart-'+i);
    if(!canvas) return;
    if(chartInstances['chart-'+i]) { chartInstances['chart-'+i].destroy(); }
    
    const field = fields.find(f=>f.id===c.field);
    if(!field) return;
    
    // Group data
    const counts = {};
    records.forEach(r=>{
      const val = r.data?.[c.field]||'(vazio)';
      counts[val] = (counts[val]||0) + (c.aggregation==='sum' ? (parseFloat(r.data?.[c.valueField])||0) : 1);
    });
    
    const labels = Object.keys(counts);
    const data = Object.values(counts);
    const colors = ['#6c63ff','#22c55e','#f59e0b','#ef4444','#3b82f6','#ec4899','#14b8a6','#f97316'];
    
    chartInstances['chart-'+i] = new Chart(canvas, {
      type: c.chartType||'bar',
      data: { labels, datasets:[{ label: c.title, data, backgroundColor: c.chartType==='pie'||c.chartType==='doughnut' ? colors : colors[0], borderColor: 'transparent', borderRadius: 4 }] },
      options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{ labels:{color:'#9898a6',font:{size:11}} } }, scales: c.chartType==='pie'||c.chartType==='doughnut' ? {} : { x:{ticks:{color:'#9898a6'},grid:{color:'#2e2e33'}}, y:{ticks:{color:'#9898a6'},grid:{color:'#2e2e33'}} } }
    });
  });
}

function addChart(screenId) { openChartConfig(screenId, null); }
function editChart(screenId, chartIdx) { openChartConfig(screenId, chartIdx); }

async function saveChart(screenId, chartIdx) {
  const chart = {
    title: document.getElementById('chart-title').value,
    chartType: document.getElementById('chart-type').value,
    field: document.getElementById('chart-field').value,
    aggregation: document.getElementById('chart-agg').value,
    valueField: document.getElementById('chart-value').value
  };
  const screen = allScreens.find(s=>s.id===screenId);
  const charts = [...(screen?.charts||[])];
  if(chartIdx!==null) charts[chartIdx]=chart; else charts.push(chart);
  await db.collection('screens').doc(screenId).update({charts});
  closeModal();
  await loadScreens();
  showScreen(screenId);
}

async function deleteChart(screenId, chartIdx) {
  if(!confirm('Excluir este gráfico?')) return;
  const screen = allScreens.find(s=>s.id===screenId);
  const charts = [...(screen?.charts||[])];
  charts.splice(chartIdx,1);
  await db.collection('screens').doc(screenId).update({charts});
  closeModal();
  await loadScreens();
  showScreen(screenId);
}

async function saveScreenGeneral(screenId) {
  const name = document.getElementById('cfg-name')?.value;
  const icon = document.getElementById('cfg-icon')?.value;
  const order = parseInt(document.getElementById('cfg-order')?.value)||0;

async function deleteScreen(screenId) {
  if(!confirm('Excluir esta tela e todos os seus registros? Ação irreversível.')) return;
  const snap = await db.collection('records').where('screenId','==',screenId).get();
  const batch = db.batch();

  await batch.commit();
  closeModal();
  await loadScreens();
  goHome();

function openFieldModal(screenId, fieldId) {
  const screen = allScreens.find(s=>s.id===screenId);

        <div class="form-group"><label>Tipo</label>
          <select id="field-type-input" onchange="toggleFieldTypeOptions()">

      </div>
      <div class="form-group" id="field-linked-wrap" style="${existing?.type==='linked'?'':'display:none'}">

        <select id="field-linked-input"><option value="">Selecionar tela…</option>${screenOptions}</select>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px">
        <label class="form-check"><input type="checkbox" id="field-required" ${existing?.required?'checked':''}><span>Obrigatório</span></label>
        <label class="form-check"><input type="checkbox" id="field-editable" ${existing?.editable!==false?'checked':''}><span>Editável após registro</span></label>
        <label class="form-check"><input type="checkbox" id="field-unique" ${existing?.unique?'checked':''}><span>Valor único</span></label>

    </div>

}

function toggleFieldTypeOptions() {
  const type = document.getElementById('field-type-input')?.value;
  document.getElementById('field-options-wrap').style.display = type==='select'?'block':'none';
  document.getElementById('field-linked-wrap').style.display = type==='linked'?'block':'none';
}

async function saveField(screenId, fieldId='') {
  const name = document.getElementById('field-name-input')?.value.trim();
  const type = document.getElementById('field-type-input')?.value;
  if(!name) return;
  
  const field = {
    id: fieldId || 'f'+Date.now(),
    name, type,
    required: document.getElementById('field-required')?.checked||false,
    editable: document.getElementById('field-editable')?.checked!==false,
    unique: document.getElementById('field-unique')?.checked||false,
    showInTable: document.getElementById('field-show')?.checked!==false,
    order: fieldId ? (allScreens.find(s=>s.id===screenId)?.fields?.find(f=>f.id===fieldId)?.order||0) : ((allScreens.find(s=>s.id===screenId)?.fields||[]).length)
  };
  
  if(type==='select') field.options = (document.getElementById('field-options-input')?.value||'').split('\n').filter(Boolean);
  if(type==='linked') field.linkedScreen = document.getElementById('field-linked-input')?.value;
  
  const screen = allScreens.find(s=>s.id===screenId);
  let fields = [...(screen?.fields||[])];
  const idx = fields.findIndex(f=>f.id===fieldId);
  if(idx>=0) fields[idx]=field; else fields.push(field);
  
  await db.collection('screens').doc(screenId).update({fields});
  closeModal();
  await loadScreens();
  openScreenConfig(screenId);
}

async function deleteField(screenId, fieldId) {
  if(!confirm('Excluir este campo? Os dados existentes não serão afetados, mas o campo não aparecerá mais.')) return;
  const screen = allScreens.find(s=>s.id===screenId);
  const fields = (screen?.fields||[]).filter(f=>f.id!==fieldId);
  await db.collection('screens').doc(screenId).update({fields});
  closeModal();
  await loadScreens();
  openScreenConfig(screenId);
}

// ─── COMMAND MODAL ────────────────────────────────────────────────
function openCommandModal(screenId, cmdId) {
  const screen = allScreens.find(s=>s.id===screenId);
  const existing = cmdId ? (screen?.commands||[]).find(c=>c.id===cmdId) : null;
  const screenOptions = allScreens.map(s=>`<option value="${s.id}" ${existing?.targetScreen===s.id?'selected':''}>${s.name}</option>`).join('');
  const addFields = existing?.fields||[];
  
  showModal(`<div class="modal modal-lg">
    <div class="modal-header">
      <div class="modal-title">${existing?'Editar':'Novo'} comando</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label>Nome do comando</label><input type="text" id="cmd-name-input" value="${existing?.name||''}" placeholder="Ex: Enviar para Conferência"></div>
        <div class="form-group"><label>Ícone (emoji)</label><input type="text" id="cmd-icon-input" value="${existing?.icon||'▶'}" style="font-size:18px"></div>
      </div>
      <div class="form-group"><label>Descrição (opcional)</label><input type="text" id="cmd-desc-input" value="${existing?.description||''}" placeholder="Descrição exibida no formulário"></div>
      <div class="form-group"><label>Mover registro para tela</label>
        <select id="cmd-target-input"><option value="">Não mover (apenas atualizar)</option>${screenOptions}</select>
      </div>
      <div class="divider"></div>
      <div style="font-size:13px;font-weight:600;margin-bottom:10px">Campos adicionais do comando</div>
      <div id="cmd-add-fields">
        ${addFields.map((f,i)=>`<div class="field-item" id="cmd-af-${i}">
          <div class="field-info"><input type="text" value="${f.name}" style="background:var(--bg4)" onchange="updateCmdField(${i},'name',this.value)"></div>
          <select style="background:var(--bg4);border:1px solid var(--border);border-radius:var(--radius);padding:6px;color:var(--text)" onchange="updateCmdField(${i},'type',this.value)">
            ${['text','number','date','select'].map(t=>`<option value="${t}" ${f.type===t?'selected':''}>${t}</option>`).join('')}
          </select>
          <button class="btn btn-danger btn-sm" onclick="removeCmdField(${i})">🗑</button>
        </div>`).join('')}
      </div>
      <button class="btn btn-secondary btn-sm" style="margin-top:8px" onclick="addCmdField()">+ Campo adicional</button>
    </div>
    <div class="modal-footer">
      ${cmdId?`<button class="btn btn-danger" onclick="deleteCommand('${screenId}','${cmdId}')">Excluir</button>`:''}
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveCommand('${screenId}','${cmdId||''}')">Salvar comando</button>
    </div>
  </div>`);
  
  window._cmdFields = addFields.map(f=>({...f}));
}

window._cmdFields = [];
function addCmdField() {
  window._cmdFields.push({id:'cf'+Date.now(), name:'Novo campo', type:'text', required:false});
  const i = window._cmdFields.length-1;
  const f = window._cmdFields[i];
  const div = document.createElement('div');
  div.className='field-item'; div.id='cmd-af-'+i;
  div.innerHTML=`<div class="field-info"><input type="text" value="${f.name}" style="background:var(--bg4)" onchange="updateCmdField(${i},'name',this.value)"></div>
    <select style="background:var(--bg4);border:1px solid var(--border);border-radius:var(--radius);padding:6px;color:var(--text)" onchange="updateCmdField(${i},'type',this.value)">
      ${['text','number','date'].map(t=>`<option value="${t}">${t}</option>`).join('')}
    </select>
    <button class="btn btn-danger btn-sm" onclick="removeCmdField(${i})">🗑</button>`;
  document.getElementById('cmd-add-fields').appendChild(div);
}
function updateCmdField(i,prop,val) { if(window._cmdFields[i]) window._cmdFields[i][prop]=val; }
function removeCmdField(i) { const el=document.getElementById('cmd-af-'+i); if(el) el.remove(); window._cmdFields[i]=null; }

async function saveCommand(screenId, cmdId='') {
  const name = document.getElementById('cmd-name-input')?.value.trim();
  if(!name) return;
  const cmd = {
    id: cmdId||'cmd'+Date.now(),
    name,
    icon: document.getElementById('cmd-icon-input')?.value||'▶',
    description: document.getElementById('cmd-desc-input')?.value||'',
    targetScreen: document.getElementById('cmd-target-input')?.value||'',
    fields: (window._cmdFields||[]).filter(Boolean)
  };
  const screen = allScreens.find(s=>s.id===screenId);
  let commands = [...(screen?.commands||[])];
  const idx = commands.findIndex(c=>c.id===cmdId);
  if(idx>=0) commands[idx]=cmd; else commands.push(cmd);
  await db.collection('screens').doc(screenId).update({commands});
  closeModal();
  await loadScreens();
  openScreenConfig(screenId);
}

async function deleteCommand(screenId, cmdId) {
  if(!confirm('Excluir este comando?')) return;
  const screen = allScreens.find(s=>s.id===screenId);
  const commands = (screen?.commands||[]).filter(c=>c.id!==cmdId);
  await db.collection('screens').doc(screenId).update({commands});
  closeModal();
  await loadScreens();
  openScreenConfig(screenId);
}

          <td>${u.name||'—'}</td>
          <td class="text-muted">${u.email||'—'}</td>
          <td><span class="badge-status ${u.role==='admin'?'badge-accent':'badge-blue'}">${u.role==='admin'?'Administrador':'Usuário'}</span></td>
          <td class="text-muted font-mono" style="font-size:11px">${u.createdAt?.toDate?u.createdAt.toDate().toLocaleDateString('pt-BR'):'—'}</td>
          ${isAdmin?`<td><button class="btn btn-ghost btn-sm" onclick="toggleUserRole('${u.id}','${u.role}')">${u.role==='admin'?'→ Usuário':'→ Admin'}</button></td>`:''}
        </tr>`).join('')}
      </tbody>
    </table>
  </div>`;
}

async function toggleUserRole(uid, currentRole) {
  if(!isMasterAdmin) { alert('Apenas o Administrador Mestre pode alterar perfis.'); return; }
  const newRole = currentRole==='admin'?'user':'admin';
  if(!confirm(`Alterar perfil para ${newRole==='admin'?'Administrador':'Usuário'}?`)) return;
  await db.collection('users').doc(uid).update({role:newRole});
  showAdminUsers();
}

async function showAdminAudit() {
  setTopbar('Auditoria','');
  const content = document.getElementById('main-content');
  content.innerHTML = `<div class="loading"><div class="spinner"></div> Carregando…</div>`;
  const snap = await db.collection('audit').orderBy('at','desc').limit(100).get();
  const logs = snap.docs.map(d=>d.data());
  content.innerHTML = `<div class="card"><div class="card-header"><div class="card-title">Últimas 100 ações</div></div>
    <div class="card-body">
      ${logs.length===0?'<div class="empty-state"><p>Nenhum registro de auditoria</p></div>':
        logs.map(l=>`<div class="audit-row">
          <div class="audit-dot"></div>
          <div class="audit-info">
            <div class="audit-action">${l.action}</div>
            <div class="audit-meta">Por ${l.user?.name||'—'} · ${l.at?.toDate?l.at.toDate().toLocaleString('pt-BR'):'—'}</div>
          </div>
        </div>`).join('')}
    </div>
  </div>`;
}

async function logAudit(type, screenId, recordId, action) {
  await db.collection('audit').add({
    type, screenId, recordId, action,
    user: { uid:currentUser.uid, name:userProfile?.name||currentUser.email },
    at: firebase.firestore.FieldValue.serverTimestamp()
  });
}

// ─── UTILITIES ────────────────────────────────────────────────────
function showModal(html) {
  const c = document.getElementById('modal-container');
  c.innerHTML = `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">${html}</div>`;
}
function closeModal() { document.getElementById('modal-container').innerHTML=''; }

function setTopbar(title, actionsHtml='') {
  document.getElementById('topbar-title').textContent = title;
  document.getElementById('topbar-actions').innerHTML = actionsHtml;
}

function setActivePage(page) {
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const target = document.querySelector(`[onclick*="${page}"]`) || document.querySelector(`[onclick*="'${page}'"]`);
  if(target) target.classList.add('active');
}

function switchTab(btn, targetId) {
  const parent = btn.closest('.tab-bar') || btn.parentElement;
  parent.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const container = parent.nextElementSibling?.id ? parent.parentElement : btn.closest('.modal-body')||document.getElementById('main-content');
  container.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  const target = document.getElementById(targetId);
  if(target) target.classList.add('active');
}
</script>
